; ════════════════════════════════════════════════
; platformio.ini
; 多機能液晶ロボットガジェット
; ════════════════════════════════════════════════

[env:uno_r4_wifi]
platform  = renesas-ra
board     = uno_r4_wifi
framework = arduino

; シリアルモニタ速度
monitor_speed = 9600

; ── 使用ライブラリ ────────────────────────────
; PlatformIOが自動でダウンロード・管理してくれる
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9
    bblanchon/ArduinoJson @ ^7.0.0

; ── インクルードパス ──────────────────────────
; include/ フォルダを自動認識させる
build_flags =
    -I include
